<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ЧС Администрации</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 16px;
      color: #1e293b;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
    }
    h1, h2 { margin: 0 0 16px 0; }
    label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.9rem; color: #64748b; }
    input, textarea, button {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      font-size: 16px;
      font-family: inherit;
      margin-bottom: 16px;
      background: #ffffff;
    }
    textarea { resize: vertical; min-height: 80px; }
    button {
      background: #1d4ed8;
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
      margin-bottom: 0;
    }
    button:active { background: #1e3a8a; }
    .error { color: #dc2626; font-size: 0.9rem; margin: -8px 0 12px 0; }
    .success { color: #16a34a; font-size: 0.9rem; margin: -8px 0 12px 0; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 8px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    th { background: #f8fafc; font-weight: 600; }
    .logout-btn { background: #64748b; margin-top: 8px; }
    .flex-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🛡️ ЧС Администрации</h1>

  <!-- Блок входа -->
  <div id="loginBlock" class="card">
    <h2>Вход</h2>
    <div id="loginError" class="error"></div>
    <label>Логин</label>
    <input type="text" id="loginUsername" placeholder="admin" value="">
    <label>Пароль</label>
    <input type="password" id="loginPassword" placeholder="••••••••" value="">
    <button id="loginBtn">Войти</button>
  </div>

  <!-- Блок приложения (скрыт до входа) -->
  <div id="appBlock" style="display: none;">
    <div class="card">
      <div class="flex-row">
        <h2>👤 <span id="currentUserDisplay"></span></h2>
        <button class="logout-btn" id="logoutBtn" style="width: auto; padding: 10px 18px;">Выйти</button>
      </div>
    </div>

    <div class="card">
      <h2>➕ Добавить в ЧС</h2>
      <div id="addMessage"></div>
      <label>ФИО *</label>
      <input type="text" id="fullName" placeholder="Иванов Иван Иванович">
      <label>ID аккаунта *</label>
      <input type="text" id="accountId" placeholder="Telegram ID / Discord ID">
      <label>Причина *</label>
      <textarea id="reason" placeholder="Мошенничество, спам..."></textarea>
      <label>Доп. информация</label>
      <input type="text" id="additionalInfo" placeholder="Любые приметы">
      <button id="addBtn">Добавить запись</button>
    </div>

    <div class="card">
      <h2>🔍 Поиск по базе</h2>
      <input type="text" id="searchQuery" placeholder="ФИО, ID, причина...">
      <button id="searchBtn">Искать</button>
      <div id="searchResults" style="margin-top: 20px; overflow-x: auto;"></div>
    </div>
  </div>
</div>

<script>
  // Ваши данные
  const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbz3Tukpy367zc0b8R0KBpNTbDxvSqc_0oWLOMElQGaZuZyI4PjQ4PfDzMMIPuc8YUm0iQ/exec';
  let currentUser = null;

  // Функция запросов к бэкенду
  async function callBackend(action, data) {
    try {
      const response = await fetch(BACKEND_URL + '?action=' + action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await response.json();
      return result;
    } catch (error) {
      console.error('Ошибка:', error);
      return { success: false, message: 'Ошибка соединения с сервером' };
    }
  }

  // --- Логин ---
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errDiv = document.getElementById('loginError');

    if (!username || !password) {
      errDiv.textContent = 'Введите логин и пароль';
      return;
    }

    errDiv.textContent = '';
    const res = await callBackend('login', { username, password });
    
    if (res.success) {
      currentUser = res.user;
      document.getElementById('loginBlock').style.display = 'none';
      document.getElementById('appBlock').style.display = 'block';
      document.getElementById('currentUserDisplay').textContent = currentUser.username;
      document.getElementById('loginPassword').value = '';
    } else {
      errDiv.textContent = res.message || 'Неверный логин или пароль';
    }
  });

  // --- Выход ---
  document.getElementById('logoutBtn').addEventListener('click', () => {
    currentUser = null;
    document.getElementById('loginBlock').style.display = 'block';
    document.getElementById('appBlock').style.display = 'none';
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
  });

  // --- Добавление в ЧС ---
  document.getElementById('addBtn').addEventListener('click', async () => {
    const fullName = document.getElementById('fullName').value.trim();
    const accountId = document.getElementById('accountId').value.trim();
    const reason = document.getElementById('reason').value.trim();
    const additionalInfo = document.getElementById('additionalInfo').value.trim();
    const msgDiv = document.getElementById('addMessage');

    if (!fullName || !accountId || !reason) {
      msgDiv.textContent = 'Заполните обязательные поля (ФИО, ID, Причина)';
      msgDiv.className = 'error';
      return;
    }

    const res = await callBackend('add', {
      fullName, accountId, reason,
      addedBy: currentUser.id,
      additionalInfo
    });

    if (res.success) {
      msgDiv.textContent = `✅ Запись добавлена. ID: ${res.id}`;
      msgDiv.className = 'success';
      document.getElementById('fullName').value = '';
      document.getElementById('accountId').value = '';
      document.getElementById('reason').value = '';
      document.getElementById('additionalInfo').value = '';
    } else {
      msgDiv.textContent = `❌ ${res.message}`;
      msgDiv.className = 'error';
    }
  });

  // --- Поиск ---
  document.getElementById('searchBtn').addEventListener('click', async () => {
    const query = document.getElementById('searchQuery').value.trim();
    const resultsDiv = document.getElementById('searchResults');

    if (!query) {
      resultsDiv.innerHTML = '<p style="color: #64748b;">Введите запрос</p>';
      return;
    }

    resultsDiv.innerHTML = '<p>Поиск...</p>';
    const results = await callBackend('search', { query });

    if (Array.isArray(results) && results.length > 0) {
      let html = '<table><thead><tr><th>ФИО</th><th>ID акк.</th><th>Причина</th><th>Дата</th><th>Доп.</th></tr></thead><tbody>';
      results.forEach(item => {
        html += `<tr>
          <td>${item.FullName || ''}</td>
          <td>${item.AccountID || ''}</td>
          <td>${item.Reason || ''}</td>
          <td>${item.DateAdded || ''}</td>
          <td>${item.AdditionalInfo || ''}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      resultsDiv.innerHTML = html;
    } else {
      resultsDiv.innerHTML = '<p>🔎 Ничего не найдено</p>';
    }
  });

  // Enter в поле пароля -> логин
  document.getElementById('loginPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });
  // Enter в поле поиска -> искать
  document.getElementById('searchQuery').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('searchBtn').click();
  });
</script>
</body>
</html>
